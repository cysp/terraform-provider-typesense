name: update indirect dependencies

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: create-github-app-token
        with:
          app-id: ${{ vars.CYSPBOT_APP_ID }}
          private-key: ${{ secrets.CYSPBOT_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "go.mod"
          cache: true
      - name: update indirect dependencies
        run: for x in `go list -f '{{if .Indirect}}{{.Path}}{{end}}' -m all`; do go get -u "$x"; done || true
      - name: go mod tidy
        run: go mod tidy -v
      - name: create pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.create-github-app-token.outputs.token }}
          commit-message: "chore(deps): bump indirect dependencies"
          title: "chore(deps): bump indirect dependencies"
          branch: "github-action-update-indirect-dependencies"
          body: ''
          sign-commits: true
